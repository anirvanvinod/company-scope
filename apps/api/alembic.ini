[alembic]
# Path to the alembic migration directory
script_location = alembic

# Migration file naming: revision_slug
file_template = %%(rev)s_%%(slug)s

# Add apps/api to sys.path so app.* imports resolve in env.py
prepend_sys_path = .

# Leave sqlalchemy.url blank — it is set programmatically in env.py
# from app.config.settings to keep credentials out of this file.
sqlalchemy.url =

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
